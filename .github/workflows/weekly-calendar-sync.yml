name: Weekly Calendar Sync

on:
  schedule:
    # Runs every Monday at 9:30 AM UTC (adjust to your timezone as needed)
    - cron: '30 9 * * 1'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  sync-calendars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch events and generate calendars
        run: python -m sharksice

      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.date.outputs.date }}
          files: |
            data/calendars/*.ics
            events.sqlite
    # create tag and release in tag

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: sync.log
          retention-days: 7
