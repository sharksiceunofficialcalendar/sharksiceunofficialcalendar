name: Weekly Calendar Sync

on:
  schedule:
    # Runs every Monday at 6:30 AM PST
    - cron: '0 13 * * 1'
    - cron: '0 0 25-28 * *' # this is around the time that Sharks Ice adds next months events
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  sync-calendars:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch events and generate calendars
        run: python -m sharksice

      - name: Export events to json
        run: python sharksice/export_events.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/calendars/*.ics events.db data/calendars/events.json
          git commit -m "chore: sync calendar events for $(date +'%Y-%m-%d')" || exit 0
          git push

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.date.outputs.date }}.${{ github.run_number }}
          git push origin ${{ steps.date.outputs.date }}.${{ github.run_number }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.date.outputs.date }}.${{ github.run_number }}
          files: |
            data/calendars/*.ics
            events.db

#      - name: Trigger release workflow
#        uses: actions/github-script@v9
#        with:
#          script: |
#            github.rest.actions.createWorkflowDispatch({
#              owner: context.repo.owner,
#              repo: context.repo.repo,
#              workflow_id: 'release-on-tag.yml',
#              ref: 'main',
#             inputs: {
#               'release-name': '${{ steps.date.outputs.date }}.${{ github.run_number }}'
#             }
#           })

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: sync.log
          retention-days: 7
